services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - php-fpm
    ports:
      - "8080:80"
    volumes:
      - ./app:/app
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network

  php-fpm:
    user: "${UID}:${GID}"
    build:
      context: .
      dockerfile: .docker/php/fpm.Dockerfile
      args:
        UID: ${UID}
        GID: ${GID}
    volumes:
      - ./app:/app
    networks:
      - app-network

  php-cli:
    build:
      context: .
      dockerfile: .docker/php/cli.Dockerfile
    working_dir: /app
    volumes:
      - ./app:/app
    command: [ "tail", "-f", "/dev/null" ]
    networks:
      - app-network

  composer:
    image: composer:2
    working_dir: /app
    volumes:
      - ./app:/app
    entrypoint: [ "composer" ]
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
