services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - php-fpm
    ports:
      - "8080:80"
    volumes:
      - ./app:/app
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network

  php-fpm:
    build:
      context: .
      dockerfile: .docker/php/fpm.Dockerfile
    volumes:
      - ./app:/app
    networks:
      - app-network

  php-cli:
    build:
      context: .
      dockerfile: .docker/php/cli.Dockerfile
    working_dir: /var/www
    volumes:
      - ./app:/app
    command: [ "tail", "-f", "/dev/null" ]
    depends_on: #     - postgres

    networks:
      - app-network

  composer:
    image: composer:2
    working_dir: /app
    volumes:
      - ./app:/app
    entrypoint: [ "composer" ]
    networks:
      - app-network

